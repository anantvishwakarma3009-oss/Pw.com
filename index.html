 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Secret Chat & Reactions</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #b9d6f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 430px;
            height: 92vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }
        .chat-header {
            background: #0066cc;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .user-selector {
            background: #0052a3;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 13px;
        }
        .user-selector label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .chat-messages {
            flex: 1;
            padding: 15px;
            background: #f4f7f6;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            position: relative;
        }
        .message-wrapper.sent { align-self: flex-end; }
        .message-wrapper.received { align-self: flex-start; }

        .message {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .message-wrapper.sent .message {
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 0;
        }
        .message-wrapper.received .message {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 0;
        }
        .time {
            font-size: 10px;
            margin-top: 4px;
            display: block;
        }
        .message-wrapper.sent .time { color: #e1f5fe; text-align: right; }
        .message-wrapper.received .time { color: #868e96; text-align: left; }

        /* Reaction Badge */
        .reaction-badge {
            position: absolute;
            bottom: -10px;
            right: 8px;
            background: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            animation: pop 0.2s ease-out;
        }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* Input Area */
        .chat-input-area {
            background: #ffffff;
            padding: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #e9ecef;
            position: relative;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #dee2e6;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            background: #f8f9fa;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }
        .send-btn {
            background: #0066cc;
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Emoji Keyboard Drawer */
        .emoji-drawer {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 12px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-radius: 8px;
            padding: 8px;
            max-width: 250px;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            z-index: 100;
        }
        .emoji-drawer span {
            font-size: 22px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
        }
        .emoji-drawer span:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Our Secret World 💕</div>
    
    <div class="user-selector">
        <span>Select Identity:</span>
        <label><input type="radio" name="user" value="User1" checked> Me</label>
        <label><input type="radio" name="user" value="User2"> Her</label>
    </div>

    <div class="chat-messages" id="chat-messages">
        </div>

    <div class="emoji-drawer" id="emoji-drawer">
        <span>❤️</span> <span>😂</span> <span>🥰</span> <span>😘</span> <span>🔥</span> <span>😭</span>
        <span>🥺</span> <span>👍</span> <span>✨</span> <span>🌹</span> <span>🙈</span> <span>💯</span>
    </div>

    <div class="chat-input-area">
        <button class="icon-btn" id="emoji-btn">😊</button>
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" id="send-btn">➔</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // ⚠️ APNA FIREBASE CONFIG DETAILS YAHA PASTE KREIN
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const messagesRef = database.ref('secretChatV2/messages');

    const messagesContainer = document.getElementById('chat-messages');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const emojiBtn = document.getElementById('emoji-btn');
    const emojiDrawer = document.getElementById('emoji-drawer');

    function getCurrentUser() {
        return document.querySelector('input[name="user"]:checked').value;
    }

    // Toggle Emoji Drawer
    emojiBtn.addEventListener('click', () => {
        emojiDrawer.style.display = emojiDrawer.style.display === 'grid' ? 'none' : 'grid';
    });

    // Add Emoji to input
    emojiDrawer.querySelectorAll('span').forEach(emoji => {
        emoji.addEventListener('click', (e) => {
            msgInput.value += e.target.innerText;
            emojiDrawer.style.display = 'none';
            msgInput.focus();
        });
    });

    // Message Send Function
    function sendMessage() {
        const text = msgInput.value.trim();
        if (text === '') return;

        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        messagesRef.push({
            sender: getCurrentUser(),
            text: text,
            time: timestamp,
            reaction: "" // Shuruat mein koi reaction nahi hoga
        });

        msgInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // Add Reaction Function (Double click par ❤️ reaction)
    function toggleReaction(msgId, currentReaction) {
        const newReaction = currentReaction === "❤️" ? "" : "❤️";
        database.ref('secretChatV2/messages/' + msgId).update({
            reaction: newReaction
        });
    }

    // Listen from Firebase
    messagesRef.on('value', (snapshot) => {
        messagesContainer.innerHTML = '';
        const data = snapshot.val();
        
        if (data) {
            const currentUser = getCurrentUser();
            
            Object.keys(data).forEach(msgId => {
                const msg = data[msgId];
                
                const wrapper = document.createElement('div');
                wrapper.classList.add('message-wrapper');
                wrapper.classList.add(msg.sender === currentUser ? 'sent' : 'received');

                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message');
                msgDiv.innerHTML = `${msg.text} <span class="time">${msg.time}</span>`;
                
                // Double click event for reaction
                msgDiv.addEventListener('dblclick', () => {
                    toggleReaction(msgId, msg.reaction);
                });

                wrapper.appendChild(msgDiv);

                // Agar message par reaction hai to badge show karein
                if (msg.reaction) {
                    const reactionBadge = document.createElement('span');
                    reactionBadge.classList.add('reaction-badge');
                    reactionBadge.innerText = msg.reaction;
                    wrapper.appendChild(reactionBadge);
                }

                messagesContainer.appendChild(wrapper);
            });

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    });

    // Identity switch automatic refresh
    document.querySelectorAll('input[name="user"]').forEach(radio => {
        radio.addEventListener('change', () => { messagesRef.trigger('value'); });
    });
</script>

</body>
</html>
