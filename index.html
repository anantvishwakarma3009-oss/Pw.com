<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Secret Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #efe7dd; /* Classic WhatsApp style background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: #fff;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .user-selector {
            background: #128c7e;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 14px;
        }
        .user-selector label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .chat-messages {
            flex: 1;
            padding: 15px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Chat wallpaper */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 15px;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }
        /* Message styling based on sender */
        .message.sent {
            background: #d9fdd3;
            align-self: flex-end;
            border-top-right-radius: 0;
        }
        .message.received {
            background: #ffffff;
            align-self: flex-start;
            border-top-left-radius: 0;
        }
        .message .time {
            font-size: 10px;
            color: #667781;
            text-align: right;
            margin-top: 4px;
            display: block;
        }
        .chat-input-area {
            background: #f0f2f5;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            outline: none;
        }
        .chat-input-area button {
            background: #00a884;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-input-area button:hover { background: #008f72; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Our Secret Space ❤️</div>
    
    <div class="user-selector">
        <span>Select who you are:</span>
        <label><input type="radio" name="user" value="User1" checked> Me</label>
        <label><input type="radio" name="user" value="User2"> Her</label>
    </div>

    <div class="chat-messages" id="chat-messages">
        </div>

    <div class="chat-input-area">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // ⚠️ YAHA APNA FIREBASE CONFIG PASTE KREIN
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase Initialize
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const messagesRef = database.ref('secretChat/messages');

    const messagesContainer = document.getElementById('chat-messages');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');

    // Pata lagane ke liye ki sender kaun hai
    function getCurrentUser() {
        return document.querySelector('input[name="user"]:checked').value;
    }

    // Message bhejne ka function
    function sendMessage() {
        const text = msgInput.value.trim();
        if (text === '') return;

        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const sender = getCurrentUser();

        // Database mein save karein
        messagesRef.push({
            sender: sender,
            text: text,
            time: timestamp
        });

        msgInput.value = ''; // Input clear karein
    }

    // Button click aur Enter key par send ho
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Firebase se Real-time messages listen karein
    messagesRef.on('value', (snapshot) => {
        messagesContainer.innerHTML = ''; // Puraani list clear karein
        const data = snapshot.val();
        
        if (data) {
            const currentUser = getCurrentUser();
            
            Object.values(data).forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message');
                
                // Agar message bhejne wala current user hai toh 'sent' class, nahi toh 'received'
                if (msg.sender === currentUser) {
                    msgDiv.classList.add('sent');
                } else {
                    msgDiv.classList.add('received');
                }

                msgDiv.innerHTML = `${msg.text} <span class="time">${msg.time}</span>`;
                messagesContainer.appendChild(msgDiv);
            });

            // Automatic scroll to bottom jab naya message aaye
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    });

    // Jab user radio button change kare toh chat automatically update ho jaye
    document.querySelectorAll('input[name="user"]').forEach(radio => {
        radio.addEventListener('change', () => {
            messagesRef.trigger('value'); 
        });
    });
</script>

</body>
</html>
